<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create League | Commish Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-page">

        <nav class="top-nav">
    <div class="top-nav-inner">
        <div class="logo">Commish Central</div>
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="create-league.html">Create League</a>
            <a href="league-index.html">League Index</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </div>
</nav>
        <main class="dashboard-container">

            <section class="dashboard-hero">
                <p class="eyebrow">Commish Central</p>
                <h1>Create a League</h1>
                <p class="dashboard-subtext">
                    Build your league, choose your rules, and get your members in the game.
                </p>
            </section>

            <section class="profile-card create-league-card">
                <div class="profile-header">
                    <h2>League Setup</h2>
                </div>

                <div class="form-stack">
                    <input type="text" id="leagueName" placeholder="League Name">

                    <select id="gameType">
                        <option value="">Select Game</option>
                        <option value="Madden">Madden</option>
                        <option value="CFB 25">CFB 25</option>
                    </select>

                    <select id="leagueType">
                        <option value="">Select League Type</option>
                        <option value="Competitive">Competitive</option>
                        <option value="Casual">Casual</option>
                        <option value="Money League (Buy-In)">Money League (Buy-In)</option>
                        <option value="Simulation">Simulation</option>
                    </select>

                    <select id="isCommissioner">
                        <option value="">Are you the commissioner?</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <p id="leagueMessage" class="league-message"></p>

                <div class="create-league-actions">
                    <button class="primary-btn" id="createLeagueBtn">Create League</button>
                    <a href="dashboard.html" class="secondary-btn link-btn">Back to Dashboard</a>
                </div>
            </section>

        </main>
    </div>
<script src="logout.js"></script>
    <script src="create-league.js"></script>
</body>
</html>
