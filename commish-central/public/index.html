<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commish Central</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <link rel="icon" type="image/png" href="cc-logo.png">
</head>

<body>
  <div class="dashboard-page auth-page">

    <main class="dashboard-container auth-container">

      <section class="dashboard-hero auth-hero">
        <p class="eyebrow">Commish Central</p>
        <h1>Welcome Back</h1>
        <p class="dashboard-subtext">
          Run leagues without the chaos.
        </p>
      </section>

      <section class="profile-card auth-card">
        <div class="profile-header auth-card-header">
          <h2>Login</h2>
        </div>

        <div class="form-stack">
          <input type="email" id="username" placeholder="Email">
          <input type="password" id="password" placeholder="Password">
        </div>

        <p id="loginMessage" class="league-message"></p>

        <div class="auth-actions">
          <button type="button" id="loginBtn" class="primary-btn">Login</button>
          <span class="auth-divider">or</span>
          <a href="create-account.html" class="secondary-btn link-btn">Create Account</a>
        </div>
      </section>

    </main>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
