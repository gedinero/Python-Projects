<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Commish Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=50">

    <link rel="icon" type="image/png" href="/cc-logo.png">
</head>
<body>
<nav class="top-nav">
  <div class="top-nav-inner">
    <div class="brand">
      <img src="/cc-logo.png" style="width:24px;height:24px;max-width:24px;max-height:24px;object-fit:contain;">
      <span class="brand-text">Commish Central</span>
    </div>

    <div class="nav-links">
      <a href="dashboard.html">Home</a>
      <a href="create-league.html">Create League</a>
      <a href="league-index.html">League Index</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </div>
</nav>
    <main class="dashboard-container">
        <section class="dashboard-hero">
        <p class="eyebrow">COMMISH CENTRAL</p>
        <h1>Edit Profile</h1>
        <p class="dashboard-subtext">
        Update your profile and keep your account fresh.
      </p>
    </section>

    <section class="profile-card edit-profile-card">
      <div class="profile-header">
        <h2>Edit Profile</h2>
      </div>

      <div class="edit-profile-layout">

        <div class="edit-avatar-panel">
          <img
            id="profilePreview"
            class="edit-profile-image"
            src=""
            alt="Profile Preview"
          >

          <label for="profilePicture" class="upload-photo-btn">Choose New Picture</label>
          <input type="file" id="profilePicture" accept="image/*" style="display:none;">

          <div id="cropControls" class="crop-controls" style="display:none; width:100%; max-width:360px; margin-top:12px;">

            <label for="zoomRange" style="display:block; margin-bottom:8px; font-weight:700;">
              Zoom
            </label>
            <input
              type="range"
              id="zoomRange"
              min="1"
              max="4"
              step="0.05"
              value="1"
              style="width:100%;"
            >

            <label for="moveXRange" style="display:block; margin-top:14px; margin-bottom:8px; font-weight:700;">
              Move Left / Right
            </label>
            <input
              type="range"
              id="moveXRange"
              min="-200"
              max="200"
              step="1"
              value="0"
              style="width:100%;"
            >

            <label for="moveYRange" style="display:block; margin-top:14px; margin-bottom:8px; font-weight:700;">
              Move Up / Down
            </label>
            <input
              type="range"
              id="moveYRange"
              min="-200"
              max="200"
              step="1"
              value="0"
              style="width:100%;"
            >

          </div>
        </div>

        <div class="edit-form-panel">
          <div class="form-stack">

            <input type="text" id="username" placeholder="Username">

            <input type="text" id="city" placeholder="City">

            <input type="text" id="state" placeholder="State">

            <select id="country">
              <option value="">Select Country</option>
              <option value="United States">United States</option>
              <option value="Canada">Canada</option>
              <option value="Mexico">Mexico</option>
              <option value="United Kingdom">United Kingdom</option>
              <option value="Germany">Germany</option>
              <option value="France">France</option>
              <option value="Australia">Australia</option>
              <option value="Japan">Japan</option>
              <option value="Other">Other</option>
            </select>

            <input type="text" id="otherCountry" placeholder="Enter Country" style="display:none;">

            <select id="favoriteNFL">
              <option value="">Favorite NFL Team</option>
              <option value="Arizona Cardinals">Arizona Cardinals</option>
              <option value="Atlanta Falcons">Atlanta Falcons</option>
              <option value="Baltimore Ravens">Baltimore Ravens</option>
              <option value="Buffalo Bills">Buffalo Bills</option>
              <option value="Carolina Panthers">Carolina Panthers</option>
              <option value="Chicago Bears">Chicago Bears</option>
              <option value="Cincinnati Bengals">Cincinnati Bengals</option>
              <option value="Cleveland Browns">Cleveland Browns</option>
              <option value="Dallas Cowboys">Dallas Cowboys</option>
              <option value="Denver Broncos">Denver Broncos</option>
              <option value="Detroit Lions">Detroit Lions</option>
              <option value="Green Bay Packers">Green Bay Packers</option>
              <option value="Houston Texans">Houston Texans</option>
              <option value="Indianapolis Colts">Indianapolis Colts</option>
              <option value="Jacksonville Jaguars">Jacksonville Jaguars</option>
              <option value="Kansas City Chiefs">Kansas City Chiefs</option>
              <option value="Las Vegas Raiders">Las Vegas Raiders</option>
              <option value="Los Angeles Chargers">Los Angeles Chargers</option>
              <option value="Los Angeles Rams">Los Angeles Rams</option>
              <option value="Miami Dolphins">Miami Dolphins</option>
              <option value="Minnesota Vikings">Minnesota Vikings</option>
              <option value="New England Patriots">New England Patriots</option>
              <option value="New Orleans Saints">New Orleans Saints</option>
              <option value="New York Giants">New York Giants</option>
              <option value="New York Jets">New York Jets</option>
              <option value="Philadelphia Eagles">Philadelphia Eagles</option>
              <option value="Pittsburgh Steelers">Pittsburgh Steelers</option>
              <option value="San Francisco 49ers">San Francisco 49ers</option>
              <option value="Seattle Seahawks">Seattle Seahawks</option>
              <option value="Tampa Bay Buccaneers">Tampa Bay Buccaneers</option>
              <option value="Tennessee Titans">Tennessee Titans</option>
              <option value="Washington Commanders">Washington Commanders</option>
            </select>

            <select id="favoriteCollege">
              <option value="">Favorite College Team</option>
              <option value="Alabama">Alabama</option>
              <option value="Auburn">Auburn</option>
              <option value="Clemson">Clemson</option>
              <option value="Florida">Florida</option>
              <option value="Florida State">Florida State</option>
              <option value="Georgia">Georgia</option>
              <option value="LSU">LSU</option>
              <option value="Miami">Miami</option>
              <option value="Michigan">Michigan</option>
              <option value="Notre Dame">Notre Dame</option>
              <option value="Ohio State">Ohio State</option>
              <option value="Oklahoma">Oklahoma</option>
              <option value="Oregon">Oregon</option>
              <option value="Penn State">Penn State</option>
              <option value="Tennessee">Tennessee</option>
              <option value="Texas">Texas</option>
              <option value="Texas A&amp;M">Texas A&amp;M</option>
              <option value="USC">USC</option>
            </select>

          </div>

          <p id="profileMessage" class="league-message"></p>

          <div class="edit-profile-actions">
            <button type="button" id="saveProfileBtn" class="primary-btn">Save Profile</button>
            <a href="dashboard.html" class="secondary-btn link-btn">Back to Profile</a>
          </div>
        </div>

      </div>
    </section>

  </main>

  <script src="logout.js"></script>
  <script type="module" src="edit-profile.js"></script>
<script src="script.js"></script>
</body>
</html>
