<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create League | Commish Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=50">

    <link rel="icon" type="image/png" href="/cc-logo.png">
</head>
<body>

<nav class="top-nav">
  <div class="top-nav-inner">
    <div class="brand">
      <img src="/cc-logo.png" style="width:24px;height:24px;max-width:24px;max-height:24px;object-fit:contain;">
      <span class="brand-text">Commish Central</span>
    </div>

    <div class="nav-links">
      <a href="dashboard.html">Home</a>
      <a href="create-league.html">Create League</a>
      <a href="league-index.html">League Index</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </div>
</nav>
     <main class="dashboard-container">
         <section class="dashboard-hero auth-hero">
                <p class="eyebrow">COMMISH CENTRAL</p>
                <h1>Create League</h1>
                <p class="dashboard-subtext">
                    Build your league and get it started.
                </p>
            </section>

    <section class="profile-card auth-card" style="max-width: 760px; margin: 0 auto;">
      <div class="auth-card-header">
        <h2>League Setup</h2>
      </div>

      <form id="createLeagueForm" class="form-stack">

        <input
          type="text"
          id="leagueName"
          placeholder="League Name"
          autocomplete="off"
          required
        >

        <select id="leagueGame" required>
          <option value="">Select Game</option>
          <option value="Madden">Madden</option>
          <option value="College Football">College Football</option>
        </select>

        <select id="leagueType" required>
          <option value="">Select League Type</option>
          <option value="Casual">Casual</option>
          <option value="Competitive">Competitive</option>
          <option value="Money League">Money League</option>
          <option value="Dynasty">Dynasty</option>
          <option value="Rebuild">Rebuild</option>
        </select>

        <select id="isCommissioner" required>
          <option value="">Are you the commissioner?</option>
          <option value="yes">Yes, I am the commissioner</option>
          <option value="no">No, I am joining as a player</option>
        </select>

        <p id="leagueMessage" class="league-message"></p>

        <div class="auth-actions">
          <button type="submit" id="createLeagueBtn" class="primary-btn">
            Create League
          </button>

          <a href="dashboard.html" class="secondary-btn">
            Back to Dashboard
          </a>
        </div>

      </form>
    </section>

  </main>

  <script src="logout.js"></script>
  <script src="create-league.js"></script>
<script type="module" src="create-league.js"></script>
<script src="script.js"></script>
</body>
</html>
