<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commish Central</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="hero">
            <h1>Commish Central</h1>

            <p class="divider">or</p>

            <a href="create-account.html" class="secondary-btn link-btn">Create Account</a>
        </div>
    </div>

    <script src="auth.js"></script>
