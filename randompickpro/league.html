<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League | RandomPick Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-page">
        <nav class="top-nav">
            <div class="logo">RandomPick Pro</div>
            <div class="nav-links">
                <a href="dashboard.html">Home</a>
                <a href="create-league.html">Create League</a>
                <a href="league-index.html">League Index</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </nav>

        <main class="dashboard-container">
            <section class="league-header">
                <h1 id="leagueTitle">League Name</h1>
                <p id="leagueMeta" class="dashboard-subtext"></p>
            </section>

            <section class="league-tabs">
                <button class="tab-btn active" data-tab="chat">Chat</button>
                <button class="tab-btn" data-tab="rules">League Rules</button>
                <button class="tab-btn" data-tab="news">League News</button>
                <button class="tab-btn" data-tab="schedule">Schedule Game</button>
                <button class="tab-btn" data-tab="trade">Trade Talk</button>
            </section>

            <section class="league-content-card">

                <!-- GENERAL CHAT -->
                <div class="tab-panel active" id="chat">
                    <h2>League Chat</h2>
                    <div class="chat-box" id="chatBox"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chatInput" placeholder="Send a message...">
                        <button class="primary-btn small-btn" id="sendChatBtn">Send</button>
                    </div>
                </div>

                <!-- RULES -->
                <div class="tab-panel" id="rules">
                    <h2>League Rules</h2>

                    <div id="rulesDisplay" class="info-box"></div>

                    <div id="rulesEditor" class="editor-box" style="display: none;">
                        <textarea id="rulesInput" placeholder="Write league rules here..."></textarea>
                        <button class="primary-btn small-btn" id="saveRulesBtn">Save Rules</button>
                    </div>
                </div>

                <!-- NEWS -->
                <div class="tab-panel" id="news">
                    <h2>League News</h2>

                    <div id="newsDisplay" class="info-box"></div>

                    <div id="newsEditor" class="editor-box" style="display: none;">
                        <textarea id="newsInput" placeholder="Post league news here..."></textarea>
                        <button class="primary-btn small-btn" id="saveNewsBtn">Save News</button>
                    </div>
                </div>

                <!-- SCHEDULE CHAT -->
                <div class="tab-panel" id="schedule">
                    <h2>Schedule Game</h2>
                    <div class="chat-box" id="scheduleBox"></div>
                    <div class="chat-input-row">
                        <input type="text" id="scheduleInput" placeholder="Post scheduling message...">
                        <button class="primary-btn small-btn" id="sendScheduleBtn">Send</button>
                    </div>
                </div>

                <!-- TRADE CHAT -->
                <div class="tab-panel" id="trade">
                    <h2>Trade Talk</h2>
                    <div class="chat-box" id="tradeBox"></div>
                    <div class="chat-input-row">
                        <input type="text" id="tradeInput" placeholder="Post trade talk...">
                        <button class="primary-btn small-btn" id="sendTradeBtn">Send</button>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script src="league.js"></script>
</body>
</html>
