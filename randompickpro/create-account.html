<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | RandomPick Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="hero">
            <h1>Create Account</h1>
            <p>Set up your profile and get in the game.</p>
        </div>

        <div class="card">
            <h2>Join RandomPick Pro</h2>

            <input type="text" id="newUsername" placeholder="Username">
            <input type="password" id="newPassword" placeholder="Password">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <input type="text" id="city" placeholder="City">

          <select id="country">
    <option value="United States" selected>United States</option>
    <option value="Canada">Canada</option>
    <option value="Mexico">Mexico</option>
    <option value="United Kingdom">United Kingdom</option>
    <option value="Germany">Germany</option>
    <option value="France">France</option>
    <option value="Australia">Australia</option>
    <option value="Japan">Japan</option>
</select>

<select id="state">
    <option value="">Select State</option>
</select>

<select id="favoriteNFL">
    <option value="">Select NFL Team</option>
</select>

<select id="favoriteCollege">
    <option value="">Select College Team</option>
</select>

<script src="create-account.js"></script>
