<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | RandomPick Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="hero">
            <h1>Create Account</h1>
            <p>Set up your profile and get in the game.</p>
        </div>

        <div class="card">
            <h2>Join RandomPick Pro</h2>

            <input type="text" id="newUsername" placeholder="Username">
            <input type="password" id="newPassword" placeholder="Password">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <input type="text" id="city" placeholder="City">
            <input type="text" id="favoriteNFL" placeholder="Favorite NFL Team">
            <input type="text" id="favoriteCollege" placeholder="Favorite College Team">

            <button class="primary-btn" id="createAccountBtn">Create My Account</button>

            <p class="divider">Already got an account?</p>

            <a href="index.html" class="secondary-btn link-btn">Back to Login</a>
        </div>
    </div>

    <script src="create-account.js"></script>
</body>
</html>
